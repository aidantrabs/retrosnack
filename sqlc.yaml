version: "2"
sql:
  - engine: "postgresql"
    queries: "services/api/db/queries"
    schema: "services/api/db/migrations"
    gen:
      go:
        package: "db"
        out: "services/api/internal/db"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
