version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: retrosnack
      POSTGRES_USER: retrosnack
      POSTGRES_PASSWORD: retrosnack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retrosnack"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://retrosnack:retrosnack@postgres:5432/retrosnack?sslmode=disable
      PORT: 8080
      ENV: development
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/api:/app

volumes:
  postgres_data:
